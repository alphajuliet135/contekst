services:
  contekst:
    image: ghcr.io/alphajuliet135/contekst:latest
    container_name: contekst
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # IMPORTANT: This directory contains the SQLite database.
      # Preserve it across deploys — deleting it wipes all user data.
      # Back up via Settings → Export before updating the image.
      - ./data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/contekst.db
      - AUTH_SECRET=${AUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
